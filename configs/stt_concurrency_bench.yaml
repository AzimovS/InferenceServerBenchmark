# =============================================================================
# STT Concurrency Benchmark — Throughput & WER under concurrent streams
# =============================================================================
# Measures real-time factor (RTF), WER, and latency under concurrent
# transcription requests.  Simulates multiple simultaneous audio streams
# hitting the STT server.
#
# See PRD for design rationale.
# =============================================================================

benchmark:
  name: "STT Concurrency Benchmark"
  description: "Concurrent audio transcription: RTF, WER, and latency under load"
  output_prefix: "stt_concurrency_bench"

model:
  name: "auto"  # Auto-detected from the running vLLM server

# Dataset: LibriSpeech test-clean (download with assets/download_librispeech.sh)
dataset:
  name: "librispeech-test-clean"
  path: "/assets/librispeech-test-clean/LibriSpeech/test-clean"
  max_files: 200              # Use up to 200 files for thorough benchmarking

# Concurrency levels to sweep — measures how the model degrades under load.
# Single-user baseline (level 1) is captured by the sanity bench and prior
# sweeps; this sweep starts at 16 to trace the contention/saturation curve
# and expose the GPU compute ceiling on a single L40S.
concurrency_levels: [16, 32, 48, 64, 96, 128]

requests:
  # Must be >= max(concurrency_levels) so the top of the ladder actually
  # fires that many simultaneous in-flight requests, rather than the
  # ThreadPoolExecutor capping at the request total. 5000 covers the ladder
  # with wide margin, gives tight P95/P99 confidence (~±3%), and yields
  # ~4 min of sustained load per level at concurrency >= 48 — enough to
  # surface short-term drift the previous 50-req burst couldn't detect.
  num_requests: 5000          # Per concurrency level
  temperature: 0.0            # Recommended by Voxtral docs

telemetry:
  sample_interval_sec: 2.0
  collect_gpu_stats: true
  collect_power_draw: false
  collect_temperature: false
  collect_memory_clock: false
